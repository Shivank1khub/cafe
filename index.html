<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Rowdy Cafe | Digital Menu + Gallery + Video</title>
    <!-- Bootstrap 5 + Font Awesome + Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a0a;
            background-image: radial-gradient(circle at 15% 30%, rgba(220, 20, 60, 0.08) 0%, #000000 90%);
            padding-bottom: 180px;
            color: #eee;
        }

        .glass-card,
        .category-card,
        .item-card,
        .sticky-cart,
        .filter-tab,
        .search-bar,
        .gallery-item,
        .video-card {
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 75, 75, 0.25);
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .category-card {
            margin-bottom: 1.5rem;
            overflow: hidden;
            background: rgba(10, 10, 15, 0.85);
            border-left: 4px solid #dc2f2f;
        }

        .category-header {
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.35rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
        }

        .category-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .cat-icon {
            font-size: 2rem;
            width: 44px;
            text-align: center;
        }

        .category-header i.fa-chevron-down {
            font-size: 1.5rem;
            color: #ff4d4d;
            transition: transform 0.4s ease;
        }

        .category-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.55s cubic-bezier(0.33, 1, 0.68, 1);
            padding: 0 1rem;
        }

        .category-items.show {
            max-height: 2500px;
            padding: 1rem 1rem 1.2rem 1rem;
        }

        /* Category Image (above items) */
        .category-image {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 1rem;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 75, 75, 0.3);
            transition: transform 0.2s;
        }

        .category-image img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        /* item card style - NO ICON, name left, price + button right */
        .item-card {
            background: rgba(25, 25, 35, 0.9);
            border-radius: 24px;
            margin-bottom: 0.9rem;
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            transition: 0.25s;
            border: 1px solid rgba(255, 80, 80, 0.2);
            gap: 10px;
        }

        .item-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(220, 20, 60, 0.2);
            background: rgba(40, 35, 50, 0.95);
        }

        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .item-name {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            flex: 1;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .item-price {
            font-weight: 800;
            color: #ff5e5e;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 40px;
            letter-spacing: 0.5px;
        }

        /* variant selector for momos */
        .variant-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0 4px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 48px;
            justify-content: center;
        }

        .variant-btn {
            background: #2c2c3a;
            border: none;
            color: #ddd;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.1s;
        }

        .variant-btn.active {
            background: #dc2f2f;
            color: white;
            box-shadow: 0 0 6px #ff4d4d;
        }

        .add-single-btn {
            background: #dc2f2f;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 600;
            color: white;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.1s;
        }

        .add-single-btn:active {
            transform: scale(0.96);
        }

        .search-bar {
            background: rgba(10, 10, 20, 0.8);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            margin-bottom: 1.5rem;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
            margin-bottom: 20px;
        }

        .filter-tab {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 40px;
            white-space: nowrap;
            font-weight: 600;
            cursor: pointer;
        }

        .filter-tab.active,
        .filter-tab:hover {
            background: #dc2f2f;
            color: white;
            box-shadow: 0 0 10px #ff4d4d66;
        }

        .hero {
            text-align: center;
            padding: 1.8rem 0 0.8rem;
        }

        .logo-circle {
            background: #dc2f2f30;
            width: 70px;
            height: 70px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(220, 0, 0, 0.7);
            margin-bottom: 8px;
        }

        .resto-name {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #ff8a8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sticky-cart {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(8, 8, 14, 0.96);
            backdrop-filter: blur(20px);
            border-top: 2px solid #dc2f2f;
            border-radius: 28px 28px 0 0;
            padding: 0.8rem 1.2rem;
            z-index: 1050;
        }

        .cart-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .cart-stats {
            font-weight: 700;
            gap: 12px;
            display: flex;
        }

        .btn-order-cart {
            background: #dc2f2f;
            border: none;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            margin: 2px;
        }

        .cart-items-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 8px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ff5e5e30;
            padding: 8px 0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cart-qty-btn {
            background: #2c2c3a;
            border: none;
            border-radius: 30px;
            width: 28px;
            color: #ff8a8a;
            font-size: 1.1rem;
        }

        .del-item {
            color: #ff5e5e;
            cursor: pointer;
            margin-left: 6px;
        }

        /* GALLERY + VIDEO SECTIONS - black background with white text */
        .gallery-section,
        .video-section {
            margin: 2rem 0 2rem;
            background: #000000;
            padding: 1rem;
            border-radius: 32px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
            color: white;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 24px;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            background: #1e1e2a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 75, 75, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 25px rgba(220, 20, 60, 0.4);
            border-color: #ff4d4d;
        }

        .video-card {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 32px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 220px;
            position: relative;
            transition: 0.2s;
            border: 1px solid rgba(255, 75, 75, 0.4);
        }

        .video-thumb {
            width: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .play-icon-overlay {
            position: absolute;
            background: rgba(220, 47, 47, 0.9);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .video-card:hover .play-icon-overlay {
            transform: scale(1.1);
            background: #dc2f2f;
        }

        /* Lightbox & Video Modal - pure black background, white text, no white flash */
        .lightbox-modal .modal-content,
        .video-modal .modal-content {
            background: #000000 !important;
            border: 1px solid #dc2f2f;
            border-radius: 32px;
            color: white;
        }

        .lightbox-modal .modal-header,
        .video-modal .modal-header {
            border-bottom-color: #dc2f2f;
        }

        .lightbox-modal .btn-close-white,
        .video-modal .btn-close-white {
            filter: invert(1);
        }

        .lightbox-img {
            width: 100%;
            border-radius: 24px;
            background: black;
        }

        .video-frame {
            width: 100%;
            height: 400px;
            border-radius: 24px;
            border: none;
            background: black;
        }

        .modal-footer button.btn-outline-light {
            color: white;
            border-color: #dc2f2f;
        }

        /* override modal backdrop to dark */
        .modal-backdrop.show {
            opacity: 0.9;
            background-color: #000 !important;
        }

        footer {
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 32px 32px 0 0;
            padding: 1.5rem;
            text-align: center;
        }

        .footer-links i {
            font-size: 1.4rem;
            margin: 0 12px;
            color: #ff7b7b;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000e6;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .tablet-modal .modal-content {
            background: #1e1e2a;
            border-radius: 32px;
            border: 1px solid #ff4d4d;
            color: white;
        }

        .tablet-btn {
            background: #2c2c3a;
            border: none;
            color: white;
            font-weight: bold;
            width: 60px;
            padding: 10px;
            border-radius: 30px;
            margin: 5px;
        }

        .tablet-btn.selected {
            background: #dc2f2f;
            box-shadow: 0 0 8px #ff4d4d;
        }

        @media (max-width:576px) {
            .item-name {
                font-size: 0.9rem;
            }

            .resto-name {
                font-size: 2rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .variant-btn {
                padding: 4px 10px;
                font-size: 0.7rem;
            }

            .video-frame {
                height: 260px;
            }

            .play-icon-overlay {
                width: 55px;
                height: 55px;
                font-size: 2rem;
            }

            .category-image img {
                height: 100px;
            }

            .item-right {
                gap: 8px;
            }
        }

        /* Updated button style in lightbox modal */
        .lightbox-modal .modal-footer .btn-outline-light {
            background: #000000;
            color: #ffffff;
            border: 1px solid #dc2f2f;
        }

        .lightbox-modal .modal-footer .btn-outline-light:hover {
            background: #dc2f2f;
            color: #020202;
            border-color: #dc2f2f;
        }

        /* Tablet modal pure black background */
        .tablet-modal .modal-content {
            background: #000000 !important;
        }

        

        .modal-content {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 100%;
            color: var(--bs-modal-color);
            pointer-events: auto;
            background-color: #000000;
            background-clip: padding-box;
            border: var(--bs-modal-border-width) solid var(--bs-modal-border-color);
            border-radius: var(--bs-modal-border-radius);
            outline: 0;
        }
    </style>
</head>

<body>

    <div id="loading" class="loading-overlay">
        <div class="spinner-grow text-danger" role="status"></div>
    </div>

    <main class="container" style="max-width: 700px; margin: 0 auto; padding-bottom: 1rem;">
        <div class="logo-area mt-3 text-center">
            <img src="cafe logo.png" alt="" style="width:180px ;">
        </div>
        <div class="hero">
            <h1 class="resto-name">ROWDY CAFE</h1>
            <p class="text-white-50">🔥 Bold Flavors. Pure Vibe. 🔥</p>
        </div>

        <div class="search-bar d-flex align-items-center"><i class="fas fa-search me-2 text-danger"></i><input
                type="text" id="searchInput" placeholder="Search any item... (momo, pizza, lassi)"></div>
        <div class="filter-group" id="categoryFilters"></div>
        <div id="menuContainer"></div>

        <!-- VIDEO SECTION (black background, white text) -->
        <div class="video-section">
            <h2 class="section-title"><i class="fas fa-video me-2"></i> Watch Our Vibe</h2>
            <div class="video-card" id="openVideoBtn">
                <img src="cafe logo.png" alt="Cafe Video Preview" class="video-thumb"
                    style="width:100%; height:auto; display:block;">
                <div class="play-icon-overlay"><i class="fas fa-play"></i></div>
            </div>
        </div>

        <!-- PHOTO GALLERY SECTION (black background, white text) -->
        <div class="gallery-section">
            <h2 class="section-title"><i class="fas fa-camera-retro me-2"></i> Cafe Moments</h2>
            <div class="gallery-grid" id="photoGallery"></div>
        </div>
    </main>

    <div class="sticky-cart" id="stickyCart">
        <div class="cart-summary">
            <div class="cart-stats"><span><i class="fas fa-shopping-bag text-danger"></i> <span
                        id="cartTotalItems">0</span> items</span><span><i class="fas fa-rupee-sign"></i> <span
                        id="cartTotalPrice">0</span></span></div>
            <div><button class="btn-order-cart" id="clearCartBtn"><i class="fas fa-trash-alt"></i> Clear
                    Cart</button><button class="btn-order-cart" id="viewOrderBtn"><i class="fas fa-eye"></i> View
                    Order</button><button class="btn-order-cart" id="placeOrderBtn"><i class="fab fa-whatsapp"></i>
                    Order</button></div>
        </div>
        <div id="liveCartList" class="cart-items-list">
            <div class="text-muted text-center small">✨ Your cart is empty ✨</div>
        </div>
    </div>

    <!-- Tablet Selection Modal -->
    <div class="modal fade" id="tabletModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content tablet-modal">
                <div class="modal-header border-danger">
                    <h5 class="modal-title"><i class="fas fa-tablet-alt"></i> Select Tablet No.</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="text-white-50">Choose your table number to continue</p>
                    <div class="tablet-select d-flex flex-wrap justify-content-center" id="tabletNumberSelect"></div>
                    <input type="hidden" id="selectedTablet" value="">
                </div>
                <div class="modal-footer justify-content-center">
                    <button class="btn btn-danger" id="confirmTabletBtn">Confirm & Place Order</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card">
                <div class="modal-header border-danger">
                    <h5 class="modal-title"><i class="fas fa-clipboard-list"></i> Your Order</h5><button type="button"
                        class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalCartList"></div>
                <div class="modal-footer"><button class="btn btn-outline-light"
                        data-bs-dismiss="modal">Close</button><button class="btn btn-whatsapp" id="modalWhatsappBtn" style="color: #eee
                        ;"><i
                            class="fab fa-whatsapp"></i> Send</button></div>
            </div>
        </div>
    </div>

    <!-- Lightbox Modal for Images (black background, white text) -->
    <div class="modal fade" id="lightboxModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content lightbox-modal">
                <div class="modal-body p-2 text-center">
                    <img src="" alt="Gallery Preview" id="lightboxImage" class="lightbox-img">
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Video Modal (black background, white text) -->
    <div class="modal fade" id="videoModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg video-modal">
            <div class="modal-content lightbox-modal">
                <div class="modal-body p-2 text-center">
                    <iframe id="youtubeVideo" class="video-frame" src="video.mp4" allowfullscreen></iframe>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links"><i class="fab fa-instagram"></i> <i class="fab fa-whatsapp"></i> <i
                class="fas fa-map-marker-alt"></i> <i class="far fa-clock"></i></div>
        <p class="mt-3 small text-white-50">📍 63860 42426 | ⏰ 11AM - 12AM</p>
        <p class="small text-white-50">© Rowdy Cafe — Sip, Bite, Repeat</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

        const categoryImages = {

        let cart = [];
        let activeFilter = 'ALL';
        let currentSearchTerm = '';
        let selectedTableNumber = null;
        let tabletModalInstance = null;

        const galleryImages = [
            { src: "Classic Burger.png", alt: "Classic Burger" },
            { src: "Fresh Pizza.png", alt: "Fresh Pizza" },
            { src: "Sushi Vibes.png", alt: "Sushi Vibes" },

        function initGallery() {
            const galleryContainer = document.getElementById('photoGallery');
            if (!galleryContainer) return;
            galleryContainer.innerHTML = '';
            galleryImages.forEach(img => {
                const galItem = document.createElement('div');
                galItem.className = 'gallery-item';
                galItem.innerHTML = `<img src="${img.src}" alt="${img.alt}" loading="lazy">`;
                galItem.addEventListener('click', () => {
                    document.getElementById('lightboxImage').src = img.src;
                    new bootstrap.Modal(document.getElementById('lightboxModal')).show();
                });
                galleryContainer.appendChild(galItem);
            });
        }

        // Video source (customizable)
        const CUSTOM_VIDEO_SRC = "video.mp4";
        function initVideo() {
            const videoBtn = document.getElementById('openVideoBtn');
            const videoModalElem = document.getElementById('videoModal');
            const iframe = document.getElementById('youtubeVideo');
            videoBtn.addEventListener('click', () => {
                iframe.src = CUSTOM_VIDEO_SRC;
                new bootstrap.Modal(videoModalElem).show();
            });
            videoModalElem.addEventListener('hidden.bs.modal', () => { iframe.src = ""; });
        }

        // Cart helpers
        function updateCartUI() {
            const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
            const totalPrice = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            document.getElementById('cartTotalItems').innerText = totalItems;
            document.getElementById('cartTotalPrice').innerText = totalPrice;
            const liveContainer = document.getElementById('liveCartList');
            if (!cart.length) { liveContainer.innerHTML = '<div class="text-muted text-center small">✨ Your cart is empty ✨</div>'; }
            else {
                liveContainer.innerHTML = cart.map(item => `
                <div class="cart-item-row">
                    <span><strong>${item.quantity}x</strong> ${item.name}</span>
                    <span>₹${item.price * item.quantity}</span>
                    <div class="cart-item-controls">
                        <button class="cart-qty-btn cart-decr" data-name="${item.name}" data-price="${item.price}">−</button>
                        <span>${item.quantity}</span>
                        <button class="cart-qty-btn cart-incr" data-name="${item.name}" data-price="${item.price}">+</button>
                        <i class="fas fa-trash-alt del-item" data-name="${item.name}"></i>
                    </div>
                </div>
            `).join('');
                document.querySelectorAll('.cart-decr').forEach(btn => btn.addEventListener('click', () => { let n = btn.dataset.name, p = parseInt(btn.dataset.price); adjustCartItem(n, p, -1); }));
                document.querySelectorAll('.cart-incr').forEach(btn => btn.addEventListener('click', () => { let n = btn.dataset.name, p = parseInt(btn.dataset.price); adjustCartItem(n, p, 1); }));
                document.querySelectorAll('.del-item').forEach(icon => icon.addEventListener('click', () => removeCartItem(icon.dataset.name)));
            }
            if (document.getElementById('orderModal')?.classList.contains('show')) renderModalCart();
        }
        function adjustCartItem(name, price, delta) {
            let idx = cart.findIndex(i => i.name === name);
            if (idx !== -1) {
                let newQty = cart[idx].quantity + delta;
                if (newQty <= 0) cart.splice(idx, 1);
                else cart[idx].quantity = newQty;
                updateCartUI();
            }
        }
        function removeCartItem(name) { cart = cart.filter(i => i.name !== name); updateCartUI(); }
        function clearCart() { cart = []; updateCartUI(); }
        function addToCart(itemName, itemPrice, quantity = 1) {
            let existing = cart.find(i => i.name === itemName);
            if (existing) existing.quantity += quantity;
            else cart.push({ name: itemName, price: itemPrice, quantity });
            updateCartUI();
        }
        function renderModalCart() {
            const modalBody = document.getElementById('modalCartList');
            if (!cart.length) { modalBody.innerHTML = '<p class="text-center">No items.</p>'; return; }
            modalBody.innerHTML = cart.map(item => `<div class="d-flex justify-content-between mb-2 border-bottom pb-2"><span><strong>${item.quantity}x</strong> ${item.name}</span><span>₹${item.price * item.quantity}</span></div>`).join('') + `<hr><div class="fw-bold text-end">Total: ₹${cart.reduce((s, i) => s + (i.price * i.quantity), 0)}</div>`;
        }

        function buildMenu() {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';
            const categories = Object.keys(menuData);
            categories.forEach((cat, idx) => {
                const catData = menuData[cat];
                const catId = `cat-${idx}`;
                const icon = catIconMap[cat] || '🍽️';
                let itemsHtml = '';
                if (Array.isArray(catData)) {
                    itemsHtml = catData.map(item => `
                    <div class="item-card">
                        <div class="item-row">
                            <span class="item-name">${item.name}</span>
                            <div class="item-right">
                                <span class="item-price">₹${item.price}</span>
                                <button class="add-single-btn add-simple" data-name="${item.name}" data-price="${item.price}"><i class="fas fa-plus-circle"></i> Add</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                } else if (catData.type === 'variant') {
                    itemsHtml = catData.items.map(item => {
                        const variants = item.variants;
                        const variantButtons = variants.map((v, vi) => `<button class="variant-btn" data-variant="${v.style}" data-price="${v.price}">${v.style} ₹${v.price}</button>`).join('');
                        return `
                        <div class="item-card" data-base="${item.baseName}">
                            <div class="item-row">
                                <span class="item-name">${item.baseName}</span>
                                <div class="item-right">
                                    <span class="item-price" id="price-preview-${item.baseName.replace(/\s/g, '')}">₹${variants[0].price}</span>
                                    <button class="add-single-btn add-variant" data-base="${item.baseName}" data-variants='${JSON.stringify(variants)}'><i class="fas fa-plus-circle"></i> Add</button>
                                </div>
                            </div>
                            <div class="variant-group" id="variant-${item.baseName.replace(/\s/g, '')}">${variantButtons}</div>
                        </div>
                    `;
                    }).join('');
                } else if (catData.type === 'simple') {
                    itemsHtml = catData.items.map(item => `
                    <div class="item-card">
                        <div class="item-row">
                            <span class="item-name">${item.name}</span>
                            <div class="item-right">
                                <span class="item-price">₹${item.price}</span>
                                <button class="add-single-btn add-simple" data-name="${item.name}" data-price="${item.price}"><i class="fas fa-plus-circle"></i> Add</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                }

                const catImageUrl = categoryImages[cat] || "https://picsum.photos/id/1/600/200";
                const catDiv = document.createElement('div');
                catDiv.className = 'category-card';
                catDiv.setAttribute('data-category', cat);
                catDiv.innerHTML = `
                <div class="category-header" data-cat-toggle="${catId}">
                    <div class="category-header-left"><span class="cat-icon">${icon}</span><span>${cat}</span></div>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="category-items" id="${catId}">
                    <div class="category-image">
                        <img src="${catImageUrl}" alt="${cat}" loading="lazy">
                    </div>
                    ${itemsHtml}
                </div>
            `;
                container.appendChild(catDiv);
            });
            attachCategoryToggle();
            attachAllAddEvents();
            attachVariantSelection();
        }

        function attachCategoryToggle() {
            document.querySelectorAll('.category-header').forEach(header => {
                header.removeEventListener('click', header.toggleHandler);
                const handler = () => {
                    const targetId = header.getAttribute('data-cat-toggle');
                    const itemsDiv = document.getElementById(targetId);
                    if (itemsDiv.classList.contains('show')) { itemsDiv.classList.remove('show'); header.querySelector('i').style.transform = 'rotate(0deg)'; }
                    else { itemsDiv.classList.add('show'); header.querySelector('i').style.transform = 'rotate(180deg)'; }
                };
                header.toggleHandler = handler;
                header.addEventListener('click', handler);
            });
        }

        function attachVariantSelection() {
            document.querySelectorAll('.variant-group').forEach(group => {
                const btns = group.querySelectorAll('.variant-btn');
                if (btns.length) btns[0].classList.add('active');
                const parentCard = group.closest('.item-card');
                const priceSpan = parentCard?.querySelector('.item-price');
                btns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        btns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        if (priceSpan) {
                            const newPrice = btn.getAttribute('data-price');
                            priceSpan.innerText = `₹${newPrice}`;
                        }
                    });
                });
            });
        }

        function attachAllAddEvents() {
            document.querySelectorAll('.add-simple').forEach(btn => {
                btn.onclick = () => {
                    let name = btn.dataset.name, price = parseInt(btn.dataset.price);
                    addToCart(name, price, 1);
                    btn.innerHTML = '<i class="fas fa-check"></i> Added';
                    setTimeout(() => { btn.innerHTML = '<i class="fas fa-plus-circle"></i> Add'; }, 800);
                };
            });
            document.querySelectorAll('.add-variant').forEach(btn => {
                btn.onclick = () => {
                    const base = btn.dataset.base;
                    const variants = JSON.parse(btn.dataset.variants);
                    const parentCard = btn.closest('.item-card');
                    const activeVariantBtn = parentCard.querySelector('.variant-btn.active');
                    if (!activeVariantBtn) return;
                    const variantStyle = activeVariantBtn.dataset.variant;
                    const variantPrice = parseInt(activeVariantBtn.dataset.price);
                    const fullName = `${base} (${variantStyle})`;
                    addToCart(fullName, variantPrice, 1);
                    btn.innerHTML = '<i class="fas fa-check"></i> Added';
                    setTimeout(() => { btn.innerHTML = '<i class="fas fa-plus-circle"></i> Add'; }, 800);
                };
            });
        }

        function applySearchAndFilter() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            currentSearchTerm = searchTerm;
            let searchActive = searchTerm !== '';
            if (searchActive && activeFilter !== 'ALL') {
                activeFilter = 'ALL';
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                const allTab = document.querySelector('.filter-tab[data-filter="ALL"]');
                if (allTab) allTab.classList.add('active');
            }
            const effectiveFilter = searchActive ? 'ALL' : activeFilter;
            const allCategories = document.querySelectorAll('.category-card');
            allCategories.forEach(catCard => {
                const catName = catCard.getAttribute('data-category');
                const itemCards = catCard.querySelectorAll('.item-card');
                let anyVisible = false;
                itemCards.forEach(card => {
                    const itemNameElem = card.querySelector('.item-name');
                    const itemName = itemNameElem ? itemNameElem.innerText.toLowerCase() : '';
                    const matchesSearch = searchTerm === '' || itemName.includes(searchTerm);
                    const matchesCategory = (effectiveFilter === 'ALL' || effectiveFilter === catName);
                    if (matchesSearch && matchesCategory) { card.style.display = 'flex'; anyVisible = true; }
                    else { card.style.display = 'none'; }
                });
                if (anyVisible && (effectiveFilter === 'ALL' || effectiveFilter === catName)) {
                    catCard.style.display = 'block';
                    const itemsDiv = catCard.querySelector('.category-items');
                    if (itemsDiv && !itemsDiv.classList.contains('show')) { itemsDiv.classList.add('show'); const icon = catCard.querySelector('.category-header i'); if (icon) icon.style.transform = 'rotate(180deg)'; }
                } else { catCard.style.display = 'none'; }
            });
        }

        function initFilters() {
            const filterContainer = document.getElementById('categoryFilters');
            const cats = ['ALL', ...Object.keys(menuData)];
            filterContainer.innerHTML = cats.map(cat => `<span class="filter-tab ${cat === 'ALL' ? 'active' : ''}" data-filter="${cat}">${cat}</span>`).join('');
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    if (currentSearchTerm !== '') {
                        document.getElementById('searchInput').value = '';
                        currentSearchTerm = '';
                    }
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    activeFilter = tab.getAttribute('data-filter');
                    applySearchAndFilter();
                });
            });
        }

        function showTabletSelectionAndSend() {
            if (cart.length === 0) { alert("Cart is empty! Add items first."); return; }
            if (!tabletModalInstance) tabletModalInstance = new bootstrap.Modal(document.getElementById('tabletModal'));
            selectedTableNumber = null;
            document.querySelectorAll('.tablet-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('selectedTablet').value = '';
            tabletModalInstance.show();
        }

        function generateTabletButtons() {
            const container = document.getElementById('tabletNumberSelect');
            container.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.classList.add('tablet-btn');
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tablet-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedTableNumber = i;
                    document.getElementById('selectedTablet').value = i;
                });
                container.appendChild(btn);
            }
        }

        function finalSendWhatsapp() {
            if (!selectedTableNumber) { alert("Please select a tablet number (1-10)"); return; }
            let orderMsg = `Hello Rowdy Cafe (Table ${selectedTableNumber}),\nI want to order:\n\n`;
            cart.forEach(item => { orderMsg += `${item.quantity}x ${item.name} - ₹${item.price * item.quantity}\n`; });
            let total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            orderMsg += `\nTotal: ₹${total}`;
            window.open(`https://wa.me/916386042426?text=${encodeURIComponent(orderMsg)}`, '_blank');
            tabletModalInstance.hide();
        }

        document.getElementById('searchInput')?.addEventListener('input', applySearchAndFilter);
        document.getElementById('viewOrderBtn')?.addEventListener('click', () => { renderModalCart(); new bootstrap.Modal(document.getElementById('orderModal')).show(); });
        document.getElementById('placeOrderBtn')?.addEventListener('click', showTabletSelectionAndSend);
        document.getElementById('modalWhatsappBtn')?.addEventListener('click', showTabletSelectionAndSend);
        document.getElementById('clearCartBtn')?.addEventListener('click', () => { if (cart.length) clearCart(); else alert("Cart empty"); });
        document.getElementById('confirmTabletBtn')?.addEventListener('click', finalSendWhatsapp);

        window.addEventListener('load', () => {
            buildMenu();
            initFilters();
            initGallery();
            initVideo();
            updateCartUI();
            generateTabletButtons();
            setTimeout(() => { let ld = document.getElementById('loading'); ld.style.opacity = '0'; setTimeout(() => ld.style.display = 'none', 400); }, 500);
        });
    </script>
