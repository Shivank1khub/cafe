<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Rowdy Cafe | Digital Menu</title>
    <!-- Bootstrap 5 + Font Awesome + Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: #0a0a0a;
            background-image: radial-gradient(circle at 15% 30%, rgba(220, 20, 60, 0.08) 0%, #000000 90%);
            padding-bottom: 180px;
            color: #eee;
        }
        .glass-card, .category-card, .item-card, .sticky-cart, .filter-tab, .search-bar {
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 75, 75, 0.25);
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255, 75, 75, 0.2);
            transition: all 0.3s ease;
        }
        .category-card {
            margin-bottom: 1.5rem;
            overflow: hidden;
            background: rgba(10, 10, 15, 0.85);
            border-left: 4px solid #dc2f2f;
        }
        .category-header {
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.35rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
        }
        .category-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .cat-icon {
            font-size: 2rem;
            width: 44px;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .category-header i.fa-chevron-down { font-size: 1.5rem; color: #ff4d4d; transition: transform 0.4s ease; }
        .category-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.55s cubic-bezier(0.33, 1, 0.68, 1);
            padding: 0 1rem;
        }
        .category-items.show { max-height: 2500px; padding: 1rem 1rem 1.2rem 1rem; }
        
        /* New item card style: inline row with name+price on left, add button on right */
        .item-card {
            background: rgba(25, 25, 35, 0.9);
            border-radius: 24px;
            margin-bottom: 0.9rem;
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.25s;
            border: 1px solid rgba(255, 80, 80, 0.2);
            gap: 12px;
            flex-wrap: wrap;
        }
        .item-card:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(220,20,60,0.2); background: rgba(40,35,50,0.95); }
        .item-img-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #2a1a1a, #1a0e0e);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
            color: #ff7b7b;
        }
        .item-info {
            flex: 2;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px;
        }
        .item-name {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            white-space: nowrap;
        }
        .item-price {
            font-weight: 800;
            color: #ff5e5e;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .add-single-btn {
            background: #dc2f2f;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 600;
            color: white;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(220,0,0,0.5);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .add-single-btn:active { transform: scale(0.96); background: #b91c1c; }
        
        .search-bar { background: rgba(10,10,20,0.8); padding: 0.6rem 1.2rem; border-radius: 60px; margin-bottom: 1.5rem; }
        .search-bar input { background: transparent; border: none; color: white; outline: none; width: 100%; }
        .filter-group { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; }
        .filter-tab { background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 40px; white-space: nowrap; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .filter-tab.active, .filter-tab:hover { background: #dc2f2f; color: white; box-shadow: 0 0 10px #ff4d4d66; }
        .hero { text-align: center; padding: 1.8rem 0 0.8rem; }
        .logo-circle { background: #dc2f2f30; width: 70px; height: 70px; display: inline-flex; align-items: center; justify-content: center; border-radius: 60px; backdrop-filter: blur(4px); border: 1px solid rgba(220,0,0,0.7); margin-bottom: 8px; }
        .resto-name { font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #ffffff, #ff8a8a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sticky-cart {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(8, 8, 14, 0.96); backdrop-filter: blur(20px);
            border-top: 2px solid #dc2f2f; border-radius: 28px 28px 0 0; padding: 0.8rem 1.2rem; z-index: 1050;
        }
        .cart-summary { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .cart-stats { font-weight: 700; gap: 12px; display: flex; }
        .btn-order-cart { background: #dc2f2f; border: none; font-weight: 700; padding: 6px 14px; border-radius: 40px; color: white; margin: 2px; }
        .cart-items-list { max-height: 180px; overflow-y: auto; margin-top: 10px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 8px; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ff5e5e30; padding: 8px 0; flex-wrap: wrap; gap: 8px; }
        .cart-item-controls { display: flex; align-items: center; gap: 6px; }
        .cart-qty-btn { background: #2c2c3a; border: none; border-radius: 30px; width: 28px; color: #ff8a8a; font-weight: bold; font-size: 1.1rem; }
        .del-item { color: #ff5e5e; cursor: pointer; margin-left: 6px; font-size: 1rem; }
        .clear-cart-btn { background: #3a1e1e; color: #ff9999; border: none; border-radius: 40px; padding: 5px 12px; font-size: 0.7rem; }
        footer { margin-top: 40px; background: rgba(0,0,0,0.8); border-radius: 32px 32px 0 0; padding: 1.5rem; text-align: center; }
        .footer-links i { font-size: 1.4rem; margin: 0 12px; color: #ff7b7b; }
        .loading-overlay { position: fixed; top:0;left:0;width:100%;height:100%; background:#000000e6; z-index:2000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(10px); transition: opacity 0.5s; }
        /* tablet modal */
        .tablet-modal .modal-content { background: #1e1e2a; border-radius: 32px; border: 1px solid #ff4d4d; }
        .tablet-select { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        .tablet-btn { background: #2c2c3a; border: none; color: white; font-weight: bold; width: 60px; padding: 10px; border-radius: 30px; transition: 0.1s; }
        .tablet-btn.selected { background: #dc2f2f; color: white; box-shadow: 0 0 8px #ff4d4d; }
        @media (max-width:576px) { .item-name { white-space: normal; font-size: 0.9rem; } .item-card { flex-wrap: wrap; } .add-single-btn { margin-left: auto; } .resto-name { font-size: 2rem; } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><div class="spinner-grow text-danger" role="status"></div></div>

<main class="container" style="max-width: 700px; margin: 0 auto; padding-bottom: 1rem;">
    <div class="logo-area mt-3 text-center"><div class="logo-circle d-inline-flex"><i class="fas fa-mug-hot" style="font-size: 2.5rem; color: #ff5e5e;"></i></div></div>
    <div class="hero"><h1 class="resto-name">ROWDY CAFE</h1><p class="text-white-50">🔥 Bold Flavors. Pure Vibe. 🔥</p></div>

    <div class="search-bar d-flex align-items-center"><i class="fas fa-search me-2 text-danger"></i><input type="text" id="searchInput" placeholder="Search any item... (momo, pizza, lassi)"></div>
    <div class="filter-group" id="categoryFilters"></div>
    <div id="menuContainer"></div>
</main>

<div class="sticky-cart" id="stickyCart">
    <div class="cart-summary">
        <div class="cart-stats"><span><i class="fas fa-shopping-bag text-danger"></i> <span id="cartTotalItems">0</span> items</span><span><i class="fas fa-rupee-sign"></i> <span id="cartTotalPrice">0</span></span></div>
        <div><button class="btn-order-cart" id="clearCartBtn"><i class="fas fa-trash-alt"></i> Clear Cart</button><button class="btn-order-cart" id="viewOrderBtn"><i class="fas fa-eye"></i> View Order</button><button class="btn-order-cart" id="placeOrderBtn"><i class="fab fa-whatsapp"></i> Order</button></div>
    </div>
    <div id="liveCartList" class="cart-items-list"><div class="text-muted text-center small">✨ Your cart is empty ✨</div></div>
</div>

<!-- Tablet Selection Modal (Bootstrap) -->
<div class="modal fade" id="tabletModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content tablet-modal">
            <div class="modal-header border-danger">
                <h5 class="modal-title"><i class="fas fa-tablet-alt"></i> Select Tablet No.</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p class="text-white-50">Choose your table number to continue</p>
                <div class="tablet-select" id="tabletNumberSelect">
                    <!-- JS will generate 1-10 -->
                </div>
                <input type="hidden" id="selectedTablet" value="">
            </div>
            <div class="modal-footer justify-content-center">
                <button class="btn btn-danger" id="confirmTabletBtn">Confirm & Place Order</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="orderModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content glass-card"><div class="modal-header border-danger"><h5 class="modal-title"><i class="fas fa-clipboard-list"></i> Your Order</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body" id="modalCartList"></div><div class="modal-footer"><button class="btn btn-outline-light" data-bs-dismiss="modal">Close</button><button class="btn btn-whatsapp" id="modalWhatsappBtn"><i class="fab fa-whatsapp"></i> Send</button></div></div></div></div>

<footer><div class="footer-links"><i class="fab fa-instagram"></i> <i class="fab fa-whatsapp"></i> <i class="fas fa-map-marker-alt"></i> <i class="far fa-clock"></i></div><p class="mt-3 small text-white-50">📍 63860 42426 | ⏰ 11AM - 12AM</p><p class="small text-white-50">© Rowdy Cafe — Sip, Bite, Repeat</p></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ---------- COMPLETE MENU DATA ----------
    const menuData = {
        "SWEET LASSI": [{ name: "Mango Lassi", price: 95 },{ name: "Orange Lassi", price: 95 },{ name: "Strawberry Lassi", price: 95 },{ name: "Rose Lassi", price: 95 },{ name: "Butterscotch Lassi", price: 95 },{ name: "Kesar Pista Lassi", price: 95 }],
        "REFRESHER": [{ name: "Nimbu Pani", price: 45 },{ name: "Nimbu Soda Masala", price: 45 },{ name: "Nariyal Pani", price: 55 }],
        "MOJITOS": [{ name: "Mango Mojito", price: 94 },{ name: "Classic Virgin Mojito", price: 104 },{ name: "Blue Lagoon Mojito", price: 104 },{ name: "Blueberry Mojito", price: 104 }],
        "DESSERT SHAKE": [{ name: "Oreo Shake", price: 114 },{ name: "Kit Kat Shake", price: 154 },{ name: "Butterscotch Shake", price: 104 },{ name: "Banana Shake", price: 104 },{ name: "Strawberry Shake", price: 114 },{ name: "Mango Shake", price: 124 }],
        "COLD COFFEE": [{ name: "Classic Cold Coffee", price: 84 },{ name: "Hazelnut Cold Coffee", price: 114 },{ name: "Caramel Cold Coffee", price: 114 }],
        "HOT BEVERAGES": [{ name: "Regular Chai", price: 45 },{ name: "Masala Chai", price: 45 },{ name: "Elaichi Chai", price: 45 },{ name: "Adrak Wali Chai", price: 45 },{ name: "Tandoori Chai", price: 45 },{ name: "Cappuccino Coffee", price: 55 },{ name: "Mocha Coffee", price: 55 },{ name: "Vanilla Coffee", price: 55 }],
        "CLASSIC MOMOS": [{ name: "Veg Momo", price: 90 },{ name: "Veg Peri Peri Momo", price: 110 },{ name: "Veg Cheese Momo", price: 130 },{ name: "Paneer Achari Momo", price: 130 },{ name: "Paneer Peri Peri Momo", price: 130 }],
        "PAHADI SOUP MOMO (JHOL)": [{ name: "Veg Jhol Momo", price: 145 },{ name: "Veg Paneer Jhol Momo", price: 165 }],
        "TANDOORI BHATTI SE": [{ name: "Creamy Veg Tandoori Momo", price: 154 },{ name: "Creamy Paneer Tandoori Momo", price: 174 }],
        "SIZZLER & FRIES": [{ name: "Veg Sizzler with Noodles", price: 274 },{ name: "Salted Fries (Large)", price: 104 },{ name: "Peri Peri Fries (Large)", price: 124 },{ name: "Cheese Fries (Large)", price: 154 }],
        "SANDWICH & BURGER": [{ name: "Grilled Spinach and Corn Sandwich", price: 105 },{ name: "Paneer Tikka Sandwich", price: 150 },{ name: "Veg Burger", price: 84 },{ name: "Peri Peri Burger", price: 100 }],
        "PIZZA": [{ name: "Onion Capsicum Corn Pizza", price: 190 },{ name: "Farmhouse Pizza", price: 190 },{ name: "Paneer Tandoori Pizza", price: 200 },{ name: "Paneer Barebeque Pizza", price: 200 }],
        "SPRING ROLLS": [{ name: "Veg Cigar Rolls (4 Pcs)", price: 90 },{ name: "Veg Rolls (2 Pcs / 8 Small Pcs)", price: 120 },{ name: "Paneer Rolls (2 Pcs / 8 Small Pcs)", price: 170 }],
        "PASTA": [{ name: "Red Sauce Pasta", price: 165 },{ name: "White Sauce Pasta", price: 170 },{ name: "Add Cheese (Extra)", price: 45 }],
        "PAV BHAJI": [{ name: "Bhaji With 2 Butter Pav", price: 165 },{ name: "Butter Bhaji With 2 Butter Pav", price: 170 },{ name: "Extra Pav (2 Pcs)", price: 30 }],
        "KOREAN RAMEN": [{ name: "Koreans Spicy Veg Ramen", price: 184 },{ name: "Korean Cheese Ramen", price: 204 },{ name: "Korean Kimchi Ramen", price: 184 }],
        "KOREAN CORN DOG": [{ name: "Chilli Garlic Corn Dog", price: 174 },{ name: "Peri Peri Corn Dog", price: 174 },{ name: "Tandoori Corn Dog", price: 174 },{ name: "Barbeque Corn Dog", price: 174 }],
        "CHOLE-BHATURE & PARATHA": [{ name: "Bhatura 2 Pcs with Pindi Chole", price: 190 },{ name: "Laccha Paratha With 4 Pcs Veg Shammi Kebab", price: 220 },{ name: "Laccha Paratha With Lucknawi Veg Galouti", price: 205 },{ name: "Laccha Paratha With Dal Makhani", price: 215 },{ name: "Laccha Paratha With Soya Keema Matar", price: 205 }],
        "IDLI & MEDU VADA": [{ name: "Idli 2 Pcs With Sambhar", price: 100 },{ name: "Idli & Wada 1 Pcs Each With Sambhar", price: 120 },{ name: "Medu Wada 2 Pcs With Sambhar", price: 135 }],
        "FRIED RICE, MANCHURIAN": [{ name: "Fried Rice With Manchurian Ball", price: 210 },{ name: "Plain Rice Bowl With Chole Masala", price: 185 },{ name: "Plain Rice Bowl With Rajma", price: 195 },{ name: "Plain Rice Bowl With Dal Makhani", price: 214 }],
        "BIRYANI": [{ name: "Veg Biryani", price: 190 },{ name: "Paneer Biryani", price: 290 }],
        "KEBAB": [{ name: "Veg Shammi Kebab (4 PCS)", price: 135 },{ name: "Veg Lucknawi Galouti (4 Pcs)", price: 135 },{ name: "Veg Harabhara Kebab (4 Pcs)", price: 150 }],
        "WAFFLE & DESSERTS": [{ name: "Dark Chocolate Waffle", price: 154 },{ name: "Oreo Waffle", price: 164 },{ name: "Dark And White Waffle", price: 174 },{ name: "Chocolate Brownies", price: 94 },{ name: "Sizzling Brownies With Ice Cream", price: 154 }],
        "SWEETY SWEET": [{ name: "Gulab Jamun (2 Pcs)", price: 70 },{ name: "Ras Malai (1 Pcs)", price: 80 },{ name: "Moon Dal Halwa", price: 110 },{ name: "Moong Dal Halwa Sizzler", price: 130 }],
        "BUBBLE TEA": [{ name: "Strawberry Blush", price: 164 },{ name: "Blue Citrus", price: 164 },{ name: "Mango Passion", price: 164 },{ name: "Lychee Lush", price: 164 }]
    };
    
    const catIconMap = {
        "SWEET LASSI": "🥛", "REFRESHER": "🍋", "MOJITOS": "🍹", "DESSERT SHAKE": "🥤", "COLD COFFEE": "☕", "HOT BEVERAGES": "🍵",
        "CLASSIC MOMOS": "🥟", "PAHADI SOUP MOMO (JHOL)": "🍜", "TANDOORI BHATTI SE": "🔥", "SIZZLER & FRIES": "🍟", "SANDWICH & BURGER": "🍔",
        "PIZZA": "🍕", "SPRING ROLLS": "🌯", "PASTA": "🍝", "PAV BHAJI": "🥖", "KOREAN RAMEN": "🍲", "KOREAN CORN DOG": "🌭",
        "CHOLE-BHATURE & PARATHA": "🍛", "IDLI & MEDU VADA": "🥞", "FRIED RICE, MANCHURIAN": "🍚", "BIRYANI": "🍛", "KEBAB": "🍢",
        "WAFFLE & DESSERTS": "🧇", "SWEETY SWEET": "🍬", "BUBBLE TEA": "🧋"
    };
    
    let cart = []; // { name, price, quantity }
    let activeFilter = 'ALL';
    let currentSearchTerm = '';
    let selectedTableNumber = null;
    let tabletModalInstance = null;
    let pendingWhatsappSend = false; // to handle order send after tablet confirm

    // Cart helpers
    function updateCartUI() {
        const totalItems = cart.reduce((s,i) => s + i.quantity, 0);
        const totalPrice = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
        document.getElementById('cartTotalItems').innerText = totalItems;
        document.getElementById('cartTotalPrice').innerText = totalPrice;
        const liveContainer = document.getElementById('liveCartList');
        if (!cart.length) { liveContainer.innerHTML = '<div class="text-muted text-center small">✨ Your cart is empty ✨</div>'; }
        else {
            liveContainer.innerHTML = cart.map((item, idx) => `
                <div class="cart-item-row">
                    <span><strong>${item.quantity}x</strong> ${item.name}</span>
                    <span>₹${item.price * item.quantity}</span>
                    <div class="cart-item-controls">
                        <button class="cart-qty-btn cart-decr" data-name="${item.name}" data-price="${item.price}">−</button>
                        <span class="mx-1">${item.quantity}</span>
                        <button class="cart-qty-btn cart-incr" data-name="${item.name}" data-price="${item.price}">+</button>
                        <i class="fas fa-trash-alt del-item" data-name="${item.name}"></i>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.cart-decr').forEach(btn => btn.addEventListener('click', (e) => { let n=btn.dataset.name, p=parseInt(btn.dataset.price); adjustCartItem(n, p, -1); }));
            document.querySelectorAll('.cart-incr').forEach(btn => btn.addEventListener('click', (e) => { let n=btn.dataset.name, p=parseInt(btn.dataset.price); adjustCartItem(n, p, 1); }));
            document.querySelectorAll('.del-item').forEach(icon => icon.addEventListener('click', (e) => { let n=icon.dataset.name; removeCartItem(n); }));
        }
        if (document.getElementById('orderModal')?.classList.contains('show')) renderModalCart();
    }
    function adjustCartItem(name, price, delta) {
        let idx = cart.findIndex(i => i.name === name);
        if (idx !== -1) {
            let newQty = cart[idx].quantity + delta;
            if (newQty <= 0) cart.splice(idx,1);
            else cart[idx].quantity = newQty;
            updateCartUI();
        }
    }
    function removeCartItem(name) { cart = cart.filter(i => i.name !== name); updateCartUI(); }
    function clearCart() { cart = []; updateCartUI(); }
    function addToCart(itemName, itemPrice, quantity = 1) {
        if (quantity <= 0) return;
        let existing = cart.find(i => i.name === itemName);
        if (existing) existing.quantity += quantity;
        else cart.push({ name: itemName, price: itemPrice, quantity });
        updateCartUI();
    }

    function renderModalCart() {
        const modalBody = document.getElementById('modalCartList');
        if (!cart.length) { modalBody.innerHTML = '<p class="text-center">No items.</p>'; return; }
        modalBody.innerHTML = cart.map(item => `<div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2"><span><strong>${item.quantity}x</strong> ${item.name}</span><span>₹${item.price * item.quantity}</span></div>`).join('') + `<hr><div class="fw-bold text-end">Total: ₹${cart.reduce((s,i)=>s+(i.price*i.quantity),0)}</div>`;
    }

    // BUILD MENU (item card: only add button, no qty selector)
    function buildMenu() {
        const container = document.getElementById('menuContainer');
        container.innerHTML = '';
        const categories = Object.keys(menuData);
        categories.forEach((cat, idx) => {
            const items = menuData[cat];
            const catId = `cat-${idx}`;
            const icon = catIconMap[cat] || '🍽️';
            const catDiv = document.createElement('div');
            catDiv.className = 'category-card';
            catDiv.setAttribute('data-category', cat);
            catDiv.innerHTML = `
                <div class="category-header" data-cat-toggle="${catId}">
                    <div class="category-header-left"><span class="cat-icon">${icon}</span><span>${cat}</span></div>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="category-items" id="${catId}">
                    ${items.map(item => `
                        <div class="item-card" data-item-name="${item.name}">
                            <div class="item-img-icon"><i class="fas fa-utensil-spoon"></i></div>
                            <div class="item-info"><span class="item-name">${item.name}</span><span class="item-price">₹${item.price}</span></div>
                            <button class="add-single-btn add-item-cart" data-name="${item.name}" data-price="${item.price}"><i class="fas fa-plus-circle"></i> Add</button>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(catDiv);
        });
        attachCategoryToggle();
        attachAddEvents();
    }
    function attachCategoryToggle() {
        document.querySelectorAll('.category-header').forEach(header => {
            header.removeEventListener('click', header.toggleHandler);
            const handler = () => {
                const targetId = header.getAttribute('data-cat-toggle');
                const itemsDiv = document.getElementById(targetId);
                if (itemsDiv.classList.contains('show')) { itemsDiv.classList.remove('show'); header.querySelector('i').style.transform = 'rotate(0deg)'; }
                else { itemsDiv.classList.add('show'); header.querySelector('i').style.transform = 'rotate(180deg)'; }
            };
            header.toggleHandler = handler;
            header.addEventListener('click', handler);
        });
    }
    function attachAddEvents() {
        document.querySelectorAll('.add-item-cart').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                let name = btn.dataset.name;
                let price = parseInt(btn.dataset.price);
                addToCart(name, price, 1);
                btn.innerHTML = '<i class="fas fa-check"></i> Added';
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-plus-circle"></i> Add'; }, 800);
            };
        });
    }

    // SEARCH + FILTER (search overrides category filter)
    function applySearchAndFilter() {
        const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
        currentSearchTerm = searchTerm;
        let searchActive = searchTerm !== '';
        if (searchActive && activeFilter !== 'ALL') {
            activeFilter = 'ALL';
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            const allTab = document.querySelector('.filter-tab[data-filter="ALL"]');
            if (allTab) allTab.classList.add('active');
        }
        const effectiveFilter = searchActive ? 'ALL' : activeFilter;
        const allCategories = document.querySelectorAll('.category-card');
        allCategories.forEach(catCard => {
            const catName = catCard.getAttribute('data-category');
            const itemCards = catCard.querySelectorAll('.item-card');
            let anyVisible = false;
            itemCards.forEach(card => {
                const itemName = card.querySelector('.item-name')?.innerText.toLowerCase() || '';
                const matchesSearch = searchTerm === '' || itemName.includes(searchTerm);
                const matchesCategory = (effectiveFilter === 'ALL' || effectiveFilter === catName);
                if (matchesSearch && matchesCategory) { card.style.display = 'flex'; anyVisible = true; }
                else { card.style.display = 'none'; }
            });
            if (anyVisible && (effectiveFilter === 'ALL' || effectiveFilter === catName)) {
                catCard.style.display = 'block';
                const itemsDiv = catCard.querySelector('.category-items');
                if (itemsDiv && !itemsDiv.classList.contains('show')) { itemsDiv.classList.add('show'); const icon = catCard.querySelector('.category-header i'); if(icon) icon.style.transform = 'rotate(180deg)'; }
            } else { catCard.style.display = 'none'; }
        });
    }

    function initFilters() {
        const filterContainer = document.getElementById('categoryFilters');
        const cats = ['ALL', ...Object.keys(menuData)];
        filterContainer.innerHTML = cats.map(cat => `<span class="filter-tab ${cat === 'ALL' ? 'active' : ''}" data-filter="${cat}">${cat}</span>`).join('');
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                if (currentSearchTerm !== '') {
                    document.getElementById('searchInput').value = '';
                    currentSearchTerm = '';
                }
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeFilter = tab.getAttribute('data-filter');
                applySearchAndFilter();
            });
        });
    }

    // Tablet Popup before WhatsApp
    function showTabletSelectionAndSend() {
        if (cart.length === 0) { alert("Cart is empty! Add items first."); return; }
        // show modal for tablet selection
        if (!tabletModalInstance) {
            tabletModalInstance = new bootstrap.Modal(document.getElementById('tabletModal'));
        }
        // reset selected
        selectedTableNumber = null;
        document.querySelectorAll('.tablet-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('selectedTablet').value = '';
        tabletModalInstance.show();
    }
    
    function generateTabletButtons() {
        const container = document.getElementById('tabletNumberSelect');
        container.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.classList.add('tablet-btn');
            btn.setAttribute('data-tablet', i);
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tablet-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedTableNumber = i;
                document.getElementById('selectedTablet').value = i;
            });
            container.appendChild(btn);
        }
    }
    
    function finalSendWhatsapp() {
        if (!selectedTableNumber) { alert("Please select a tablet number (1-10)"); return; }
        let orderMsg = `Hello Rowdy Cafe (Table ${selectedTableNumber}),\nI want to order:\n\n`;
        cart.forEach(item => { orderMsg += `${item.quantity}x ${item.name} - ₹${item.price * item.quantity}\n`; });
        let total = cart.reduce((s,i)=>s+(i.price*i.quantity),0);
        orderMsg += `\nTotal: ₹${total}`;
        let encoded = encodeURIComponent(orderMsg);
        window.open(`https://wa.me/916386042426?text=${encoded}`, '_blank');
        tabletModalInstance.hide();
    }

    // Event Listeners
    document.getElementById('searchInput').addEventListener('input', applySearchAndFilter);
    document.getElementById('viewOrderBtn').addEventListener('click', () => { renderModalCart(); new bootstrap.Modal(document.getElementById('orderModal')).show(); });
    document.getElementById('placeOrderBtn').addEventListener('click', showTabletSelectionAndSend);
    document.getElementById('modalWhatsappBtn').addEventListener('click', showTabletSelectionAndSend);
    document.getElementById('clearCartBtn').addEventListener('click', () => { if(cart.length) clearCart(); else alert("Cart empty"); });
    document.getElementById('confirmTabletBtn').addEventListener('click', finalSendWhatsapp);

    window.addEventListener('load', () => {
        buildMenu();
        initFilters();
        updateCartUI();
        generateTabletButtons();
        setTimeout(() => { let ld = document.getElementById('loading'); ld.style.opacity='0'; setTimeout(()=>ld.style.display='none',400); }, 500);
    });
</script>
</body>
</html>
